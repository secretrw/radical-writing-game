<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>部首大擂台 - 教師主控台</title>
  <style>
    body { font-family: "微軟正黑體", sans-serif; background-color: #eceff1; margin: 0; padding: 20px; text-align: center; }
    .admin-panel { background: #37474f; color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
    .control-group { margin: 15px 0; padding: 15px; background: rgba(255,255,255,0.1); border-radius: 8px; }
    input[type="text"], input[type="number"] { font-size: 20px; padding: 10px; width: 150px; text-align: center; border-radius: 5px; border: none; }
    button { font-size: 18px; padding: 10px 20px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    
    .btn-pass { background-color: #4caf50; color: white; }
    .btn-fail { background-color: #f44336; color: white; }
    .btn-retry { background-color: #ffc107; color: #333; }
    .btn-change { background-color: #ff9800; color: white; }
    
    /* 題庫按鈕樣式 */
    .btn-lvl { color: white; border: 2px solid rgba(255,255,255,0.5); }
    .btn-easy { background-color: #8bc34a; }
    .btn-med { background-color: #ffb300; }
    .btn-hard { background-color: #e53935; }

    .dict-link { display: inline-block; margin-left: 10px; font-size: 1.2em; text-decoration: none; color: #64b5f6; font-weight: bold; }
    .dict-link:hover { color: #bbdefb; }
    
    /* 畫布改由 JS 縮放以支援 HiDPI */
    #gameCanvas { background-color: white; border: 4px solid #2196f3; border-radius: 10px; }
    .word-cloud { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 10px; }
    .word-tag { background: #e0f7fa; color: #006064; padding: 5px 10px; font-size: 1.2em; border-radius: 5px; }

    /* 原有烏鴉動畫 */
    .crows-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; pointer-events: none; }
    .anime-crow-container { position: absolute; right: 15%; transform: translateY(-50%); opacity: 0; animation: flyAcross 2.2s linear forwards; }
    .crow-1 { top: 40%; animation-delay: 0s; transform: translateY(-50%) scale(1.1); }
    .crow-2 { top: 60%; animation-delay: 0.3s; transform: translateY(-50%) scale(0.7); }
    .crow-3 { top: 30%; animation-delay: 0.7s; transform: translateY(-50%) scale(0.9); }
    .anime-crow-svg { filter: drop-shadow(4px 6px 5px rgba(0,0,0,0.4)); animation: glideBob 1.5s ease-in-out infinite alternate; }
    @keyframes flyAcross { 0% { right: 15%; opacity: 0; } 15% { right: 25%; opacity: 1; } 85% { right: 75%; opacity: 1; } 100% { right: 85%; opacity: 0; } }
    @keyframes glideBob { 0% { margin-top: 0; } 50% { margin-top: -15px; } 100% { margin-top: 15px; } }
    
    /* 失敗動畫：哇 */
    .fail-text-wa { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; color: #f44336; font-weight: 900; z-index: 10000; pointer-events: none; opacity: 0; text-shadow: 4px 4px 0 #fff, -4px -4px 0 #fff; }
    @keyframes waShake { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.3) rotate(10deg); opacity: 1; } }
    /* 保留舊閃電遮罩（備用） */
    .lightning-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.9); opacity: 0; z-index: 9999; pointer-events: none; }
    @keyframes flashFx { 0%, 20%, 40% { opacity: 1; } 10%, 30%, 100% { opacity: 0; } }

    /* [新增] 可見閃電劈下動畫 */
    .lightning-bolt-wrapper {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10001; pointer-events: none; overflow: hidden;
    }
    .lightning-bolt-svg {
      position: absolute; top: 0; left: 50%;
      transform: translateX(-50%); opacity: 0;
      filter: drop-shadow(0 0 18px #ffe066) drop-shadow(0 0 40px #ffcc00);
      animation: boltStrike 0.9s forwards;
    }
    @keyframes boltStrike {
      0%   { opacity: 0;   transform: translateX(-50%) scaleY(0);   transform-origin: top center; }
      8%   { opacity: 1;   transform: translateX(-50%) scaleY(1);   transform-origin: top center; }
      18%  { opacity: 0.6; }
      28%  { opacity: 1;   filter: drop-shadow(0 0 30px #fff) drop-shadow(0 0 60px #ffcc00); }
      45%  { opacity: 0.3; }
      60%  { opacity: 0.8; }
      80%  { opacity: 0.1; }
      100% { opacity: 0;   transform: translateX(-50%) scaleY(1); }
    }
    .lightning-bg-flash {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,230,0.85); z-index: 10000;
      pointer-events: none; opacity: 0;
      animation: bgFlashFx 0.9s forwards;
    }
    @keyframes bgFlashFx {
      0%  { opacity: 0; } 8%  { opacity: 1; } 20% { opacity: 0; }
      30% { opacity: 0.7; } 45% { opacity: 0; } 60% { opacity: 0.4; } 80% { opacity: 0; }
    }

    /* 玩家列表 & 遊戲資訊列 (顏色由 inline style 控制，這裡保留結構) */
    #gameInfoBar .player-turn-badge {
      background: #ef5350; color: white; padding: 5px 14px; border-radius: 20px;
      font-size: 1em; font-weight: bold; white-space: nowrap;
    }
    #gameInfoBar .player-turn-badge.waiting {
      background: #90a4ae; color: #37474f;
    }
    #playerListBar .player-chip {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.12); color: #fff;
      padding: 4px 12px; border-radius: 20px;
      font-size: 0.95em; font-weight: bold; white-space: nowrap;
    }
    #playerListBar .player-chip.active-turn {
      background: #f44336; box-shadow: 0 0 8px #f44336aa;
    }
    #playerListBar .player-chip.offline {
      opacity: 0.45;
    }
    .player-chip-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
    .dot-online { background: #69f0ae; }
    .dot-offline { background: #aaa; }
    .dot-active  { background: #ffeb3b; }

    .teacher-game-shell { width: 1072px; margin: 0 auto; }
    .teacher-three-col {
      display: grid;
      grid-template-columns: 320px 408px 320px;
      gap: 12px;
    }

    /* [新增] 開始/重置按鈕 */
    .btn-start { background-color: #00c853; color: white; font-size: 20px; padding: 12px 30px; border-radius: 8px; }
    .btn-reset { background-color: #607d8b; color: white; font-size: 15px; padding: 8px 18px; border-radius: 8px; }
    .btn-start:disabled { background-color: #aaa; cursor: not-allowed; }
    /* [新增] 開始計時按鈕 */
    .btn-start-timer {
      background: linear-gradient(135deg, #ff6f00, #ff8f00);
      color: white; font-size: 22px; padding: 14px 36px;
      border-radius: 10px; border: none; cursor: pointer;
      box-shadow: 0 4px 15px rgba(255,111,0,0.5);
      animation: pulseGlow 1.5s infinite;
      font-weight: bold;
    }
    .btn-start-timer:disabled { background: #aaa; box-shadow: none; animation: none; cursor: not-allowed; }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 4px 15px rgba(255,111,0,0.5); transform: scale(1); }
      50% { box-shadow: 0 4px 30px rgba(255,111,0,0.9); transform: scale(1.04); }
    }


    /* [新增] 冠軍慶祝覆蓋層 */
    #winnerOverlay {
      display: none; position: fixed; inset: 0; z-index: 20000;
      background: radial-gradient(ellipse at center, #1a0533 0%, #000 100%);
      flex-direction: column; align-items: center; justify-content: center;
      text-align: center; overflow: hidden;
    }
    #winnerOverlay.active { display: flex; }
    .winner-crown { font-size: 100px; animation: crownBounce 0.8s ease-in-out infinite alternate; }
    @keyframes crownBounce { from { transform: translateY(0) scale(1); } to { transform: translateY(-20px) scale(1.08); } }
    .winner-title { font-size: 2em; color: #ffd700; letter-spacing: 0.2em; margin: 10px 0; text-shadow: 0 0 20px #ffd700; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0%,100%{text-shadow:0 0 20px #ffd700,0 0 40px #ffd700;} 50%{text-shadow:0 0 40px #fff,0 0 80px #ffd700,0 0 120px #ff8c00;} }
    .winner-name { font-size: 4em; font-weight: 900; color: white; margin: 15px 0; text-shadow: 3px 3px 0 #b8860b, 6px 6px 0 #8b6914; animation: nameScale 1s ease-in-out infinite alternate; }
    @keyframes nameScale { from{transform:scale(1);} to{transform:scale(1.05);} }
    .winner-subtitle { font-size: 1.4em; color: #a8edea; margin: 5px 0 30px; letter-spacing: 0.1em; }
    .star-ring { position: absolute; width: 100%; height: 100%; pointer-events: none; }
    .btn-full-reset { background: linear-gradient(135deg,#00c853,#1b5e20); color:white; font-size:24px; padding:18px 50px; border-radius:50px; border:none; cursor:pointer; box-shadow:0 8px 30px rgba(0,200,83,0.5); margin-top:20px; font-weight:900; letter-spacing:0.05em; transition:transform 0.2s; }
    .btn-full-reset:hover { transform: scale(1.05); }
    /* 大廳等待面板 */
    #lobbyPanel {
      background: #37474f; color: white; border-radius: 10px;
      padding: 20px; margin-bottom: 20px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    #lobbyPanel h2 { color: #ffd54f; margin: 0 0 10px; }
    #lobbyPlayerListTeacher { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 15px 0; }
    .lobby-t-chip {
      background: rgba(255,255,255,0.15); color: #fff;
      padding: 8px 18px; border-radius: 25px;
      font-size: 1.1em; font-weight: bold;
    }
    .lobby-t-chip.offline { opacity: 0.4; }
    .join-qr-panel {
      margin: 14px auto 18px; padding: 14px; max-width: 620px;
      display: grid; grid-template-columns: 180px 1fr; gap: 14px; align-items: center;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18);
      border-radius: 10px; text-align: left;
    }
    .join-qr-panel img {
      width: 180px; height: 180px; background: #fff; padding: 8px;
      border-radius: 8px; box-sizing: border-box;
    }
    .join-url {
      padding: 8px 10px; background: rgba(0,0,0,0.25); border-radius: 6px;
      color: #fff; word-break: break-all; font-size: 0.92em; line-height: 1.4;
    }
    .btn-copy-join {
      margin: 10px 0 0; background: #00acc1; color: white;
      font-size: 14px; padding: 8px 14px; border-radius: 6px;
    }
  </style>
</head>
<body>

  <h1>👨‍🏫 教師主控台</h1>

  <!-- [新增] 等待大廳面板（遊戲未開始時顯示） -->
  <div id="lobbyPanel">
    <h2>🕐 等待大廳</h2>
    <div class="join-qr-panel">
      <img id="joinQrImage" alt="學生加入 QR Code">
      <div>
        <div style="font-size:1.05em; color:#ffd54f; font-weight:bold; margin-bottom:8px;">學生掃描 QR code 加入</div>
        <div id="joinUrlText" class="join-url">產生加入連結中...</div>
        <button id="btnCopyJoinUrl" class="btn-copy-join">複製學生加入連結</button>
      </div>
    </div>
    <div style="font-size:1em; color:#b0bec5;">目前已加入的學生：</div>
    <div id="lobbyPlayerListTeacher"><span style="color:#78909c;">尚無學生加入</span></div>
    <div style="margin-top: 15px; display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap;">
      <button id="btnStartGame" class="btn-start" disabled>▶ 開始遊戲</button>
      <button id="btnRemoveOffline" style="background:#b71c1c; color:white; font-size:14px; padding:8px 14px; border-radius:6px;" title="將所有顯示離線的幽靈玩家從名單中移除">🧹 清除離線玩家</button>
      <span id="lobbyHint" style="font-size:0.9em; color:#b0bec5;">請等待學生加入後再開始</span>
    </div>
  </div>

  <!-- 主控制面板（遊戲進行中顯示） -->
  <div id="mainPanel" style="display:none;">

    <!-- 共用容器：橘色橫幅 + 三欄 Grid 寬度完全一致，左右自動置中 -->
    <div class="teacher-game-shell">

      <!-- ① 橘色設定橫幅：使用與 gameGrid 相同的三欄結構 -->
      <div id="startTimerBanner" style="background:linear-gradient(135deg,#e65100,#bf360c); color:white; border-radius:12px; padding:16px 0 12px; margin-bottom:12px; box-shadow:0 4px 16px rgba(230,81,0,0.45);">

        <!-- 頂列：標題 + 開始計時按鈕，居中 -->
        <div style="display:flex; align-items:center; justify-content:center; gap:18px; flex-wrap:wrap; padding-bottom:12px; margin:0 12px 12px; border-bottom:1px solid rgba(255,255,255,0.25);">
          <div style="font-size:1.1em; font-weight:bold; letter-spacing:0.03em;">⚙️ 確認設定後按開始計時</div>
          <button id="btnStartTimerNow" class="btn-start-timer">▶ 開始計時</button>
        </div>

        <!-- 三欄列：與 gameGrid 完全同寬同比例 -->
        <div class="teacher-three-col" style="align-items:start;">

          <!-- 橘色左欄 (320px)：時間設定 + 重置 -->
          <div style="background:rgba(0,0,0,0.22); border-radius:8px; padding:12px; display:flex; flex-direction:column; gap:10px;">
            <div style="font-size:0.82em; font-weight:bold; opacity:0.8; letter-spacing:0.05em; text-transform:uppercase;">⏱️ 每回合時間</div>
            <div style="display:flex; align-items:center; gap:6px; justify-content:center;">
              <input type="number" id="timeInput" value="15" min="5" max="120"
                style="width:58px; font-size:18px; padding:5px; border-radius:6px; border:none; text-align:center; font-weight:bold; color:#333;">
              <span style="font-size:0.9em; opacity:0.85;">秒</span>
              <button id="btnApplyTime" class="btn-change" style="font-size:12px; padding:5px 10px; margin:0;">套用</button>
            </div>
            <div style="border-top:1px solid rgba(255,255,255,0.2); padding-top:10px;">
              <button id="btnResetGame" style="width:100%; background:rgba(0,0,0,0.35); color:white; font-size:12px; padding:8px; border:1px solid rgba(255,255,255,0.3); border-radius:6px; cursor:pointer; font-weight:bold;">🔄 重置回大廳</button>
            </div>
          </div>

          <!-- 橘色中欄 (408px)：隨機抽題 -->
          <div style="background:rgba(33,150,243,0.22); border-radius:8px; padding:12px; text-align:center;">
            <div style="font-size:0.82em; font-weight:bold; opacity:0.8; letter-spacing:0.05em; text-transform:uppercase; margin-bottom:10px;">🎲 隨機抽題</div>
            <div style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:9px;">
              <button id="btnEasy" class="btn-lvl btn-easy" style="font-size:14px; padding:8px 14px;">🟢 簡單</button>
              <button id="btnMed"  class="btn-lvl btn-med"  style="font-size:14px; padding:8px 14px;">🟡 中等</button>
              <button id="btnHard" class="btn-lvl btn-hard" style="font-size:14px; padding:8px 14px;">🔴 困難</button>
            </div>
            <button id="btnChangeRadical" class="btn-change" style="font-size:13px; padding:7px 16px; margin:0;">✏️ 手動自訂部首</button>
          </div>

          <!-- 橘色右欄 (320px)：音量 + BGM -->
          <div style="background:rgba(0,0,0,0.22); border-radius:8px; padding:12px; display:flex; flex-direction:column; gap:10px;">
            <div>
              <div style="font-size:0.82em; font-weight:bold; opacity:0.8; letter-spacing:0.05em; text-transform:uppercase; margin-bottom:5px;">🔊 特效音量</div>
              <input type="range" id="masterVolume" min="0" max="1" step="0.1" value="0.8" style="width:100%;">
            </div>
            <div style="border-top:1px solid rgba(255,255,255,0.2); padding-top:10px; display:flex; flex-direction:column; gap:5px;">
              <button id="btnToggleBGM" style="width:100%; font-size:12px; padding:7px; background:#546e7a; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">🎵 播放 BGM</button>
              <input type="range" id="bgmVolume" min="0" max="1" step="0.1" value="0.3" style="width:100%;">
              <audio id="bgmAudio" loop src="https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3?filename=lofi-study-112191.mp3"></audio>
            </div>
          </div>

        </div>
      </div><!-- /startTimerBanner -->

      <!-- ② 三欄 Grid：按開始計時後只剩這裡 -->
      <div id="gameGrid" class="teacher-three-col" style="align-items:stretch;">

        <!-- 左欄 (320px)：目前狀態、題目、判定操作 -->
        <div style="background:#ffffff; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1); padding:14px; display:flex; flex-direction:column; gap:9px;">
          <!-- 目前狀態 -->
          <div style="background:#fff8e1; border-radius:8px; padding:9px 10px; text-align:center; border:1px solid #ffe082;">
            <div style="font-size:0.75em; color:#f57f17; font-weight:bold; margin-bottom:1px; letter-spacing:0.04em;">⏱️ 目前狀態</div>
            <div>
              <span id="timerDisplay" style="font-size:2.6em; font-weight:900; color:#e53935; line-height:1.1;">--</span>
              <span style="font-size:0.85em; color:#999;"> 秒</span>
            </div>
          </div>
          <!-- 題目 -->
          <div style="background:#e3f2fd; border-radius:8px; padding:9px 10px; text-align:center; border:1px solid #90caf9;">
            <div style="font-size:0.75em; color:#1565c0; font-weight:bold; margin-bottom:1px; letter-spacing:0.04em;">📋 目前題目</div>
            <div style="font-size:2em; font-weight:bold; color:#1565c0; line-height:1.2;">【 <span id="radicalDisplay">水</span> 】部</div>
          </div>
          <div style="border-top:1px solid #eeeeee; padding-top:2px;"></div>
          <!-- 作答判定 -->
          <div style="font-size:0.75em; color:#9e9e9e; font-weight:bold; letter-spacing:0.06em; text-transform:uppercase;">✏️ 學生作答判定</div>
          <div style="display:flex; gap:8px; align-items:center;">
            <input type="text" id="wordInput" placeholder="字" autocomplete="off"
              style="font-size:28px; width:62px; padding:6px; border:2px solid #90caf9; border-radius:8px; text-align:center; box-sizing:border-box; flex-shrink:0; font-weight:bold;">
            <a id="dictLink" href="https://dict.revised.moe.edu.tw/search.jsp?md=1&word=" target="_blank"
              style="color:#1976d2; font-size:0.82em; white-space:nowrap; text-decoration:none; font-weight:bold; line-height:1.4;">📖<br>查字典</a>
          </div>
          <button id="btnApprove" class="btn-pass"  style="width:100%; font-size:12.5px; padding:9px 4px; margin:0;">✅ 確認過關（換下一位）</button>
          <button id="btnRetry"   class="btn-retry" style="width:100%; font-size:12.5px; padding:9px 4px; margin:0;">⚠️ 退回重寫（恢復計時）</button>
          <button id="btnFail"    class="btn-fail"  style="width:100%; font-size:12.5px; padding:9px 4px; margin:0;">❌ 失敗淘汰（換下一位）</button>
          <!-- 遊戲中重置 -->
          <div style="margin-top:auto; padding-top:8px; border-top:1px solid #eeeeee;">
            <button id="btnResetGameInline" style="width:100%; background:#b0bec5; color:white; font-size:11.5px; padding:7px; border:none; border-radius:6px; cursor:pointer; font-weight:bold; margin:0;">🔄 重置回大廳</button>
          </div>
        </div>

        <!-- 中欄 (408px)：玩家列表 + gameInfoBar + 畫布 -->
        <div style="display:flex; flex-direction:column; border-radius:10px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
          <div id="playerListBar" style="background:#e3f2fd; padding:7px 12px; display:flex; align-items:center; flex-wrap:wrap; gap:7px; box-sizing:border-box; border-bottom:1px solid #bbdefb; min-height:36px;">
            <span style="font-size:0.82em; color:#1565c0; flex-shrink:0; font-weight:bold;">玩家：</span>
          </div>
          <div id="gameInfoBar" style="background:#e8eaf6; padding:7px 14px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; box-sizing:border-box; border-bottom:2px solid #c5cae9;">
            <div style="font-size:0.85em; color:#3949ab; font-weight:bold;">學生作答畫面 <span style="font-size:0.82em; font-weight:normal; color:#5c6bc0;">(即時轉播)</span></div>
            <div id="currentTurnBadge" class="player-turn-badge waiting">等待中...</div>
          </div>
          <canvas id="gameCanvas" style="display:block;"></canvas>
        </div>

        <!-- 右欄 (320px)：已上榜字庫 -->
        <div style="background:#ffffff; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1); padding:14px; overflow-y:auto;">
          <h3 style="margin:0 0 10px; color:#e53935; font-size:0.95em; border-bottom:2px solid #ffccbc; padding-bottom:7px;">🌟 已上榜字庫</h3>
          <div id="wordHistory" class="word-cloud"></div>
        </div>

      </div><!-- /gameGrid -->

    </div><!-- /width wrapper -->
  </div><!-- /mainPanel -->


  <!-- [新增] 冠軍慶祝覆蓋層 -->
  <div id="winnerOverlay">
    <svg class="star-ring" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
      <g id="starGroup" opacity="0.6">
        <text x="80"  y="80"  font-size="40" fill="#ffd700" style="animation:starFloat1 3s infinite">★</text>
        <text x="700" y="100" font-size="28" fill="#ff69b4" style="animation:starFloat2 2.5s infinite">✦</text>
        <text x="50"  y="500" font-size="32" fill="#00e5ff" style="animation:starFloat1 3.5s infinite">✦</text>
        <text x="720" y="520" font-size="44" fill="#ffd700" style="animation:starFloat2 2.8s infinite">★</text>
        <text x="380" y="40"  font-size="24" fill="#fff"    style="animation:starFloat1 2s infinite">✦</text>
        <text x="200" y="560" font-size="36" fill="#ff8c00" style="animation:starFloat2 3.2s infinite">★</text>
        <text x="580" y="570" font-size="28" fill="#7fff00" style="animation:starFloat1 2.7s infinite">✦</text>
      </g>
    </svg>
    <style>
      @keyframes starFloat1{0%,100%{transform:translateY(0) rotate(0);}50%{transform:translateY(-25px) rotate(15deg);}}
      @keyframes starFloat2{0%,100%{transform:translateY(0) rotate(0);}50%{transform:translateY(-30px) rotate(-20deg);}}
    </style>
    <div class="winner-crown">🏆</div>
    <div class="winner-title">🎉 最後的生存者 🎉</div>
    <div class="winner-name" id="winnerNameDisplay">—</div>
    <div class="winner-subtitle">恭喜勝出！部首大擂台冠軍！</div>
    <button class="btn-full-reset" id="btnFullReset">🔄 重新開始（學生重新輸入姓名）</button>
  </div>
  <div id="failWa" class="fail-text-wa">哇哇哇！</div>
  <div id="lightning" class="lightning-flash"></div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io({ query: { role: 'teacher' } });
    
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const timerDisplay = document.getElementById('timerDisplay');
    const radicalDisplay = document.getElementById('radicalDisplay');
    const wordHistory = document.getElementById('wordHistory');
    const wordInput = document.getElementById('wordInput');
    const dictLink = document.getElementById('dictLink');
    const lobbyPanel = document.getElementById('lobbyPanel');
    const mainPanel = document.getElementById('mainPanel');
    const lobbyPlayerListTeacher = document.getElementById('lobbyPlayerListTeacher');
    const btnStartGame = document.getElementById('btnStartGame');
    const playerListBar = document.getElementById('playerListBar');
    const currentTurnBadge = document.getElementById('currentTurnBadge');
    const startTimerBanner = document.getElementById('startTimerBanner');
    const btnStartTimerNow = document.getElementById('btnStartTimerNow');
    const joinQrImage = document.getElementById('joinQrImage');
    const joinUrlText = document.getElementById('joinUrlText');
    const btnCopyJoinUrl = document.getElementById('btnCopyJoinUrl');
    let waitingForTimer = false; // 控制開始計時橫幅的顯示
    let defaultTimeDisplay = 15;
    const studentJoinUrl = `${window.location.origin}/join`;

    function updateJoinQrCode() {
      joinUrlText.textContent = studentJoinUrl;
      joinQrImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=360x360&margin=12&data=${encodeURIComponent(studentJoinUrl)}`;
    }

    btnCopyJoinUrl.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(studentJoinUrl);
        btnCopyJoinUrl.textContent = '已複製';
        setTimeout(() => { btnCopyJoinUrl.textContent = '複製學生加入連結'; }, 1500);
      } catch (err) {
        prompt('請複製學生加入連結：', studentJoinUrl);
      }
    });
    updateJoinQrCode();

    if ('scrollRestoration' in history) {
      history.scrollRestoration = 'manual';
    }
    function keepTeacherAtTop() {
      requestAnimationFrame(() => window.scrollTo({ top: 0, left: 0, behavior: 'auto' }));
      setTimeout(() => window.scrollTo(0, 0), 0);
    }
    function focusWordInputWithoutScroll() {
      try {
        wordInput.focus({ preventScroll: true });
      } catch (err) {
        wordInput.focus();
        keepTeacherAtTop();
      }
    }
    window.addEventListener('load', keepTeacherAtTop);
    window.addEventListener('pageshow', keepTeacherAtTop);
    keepTeacherAtTop();

    // HiDPI 畫布解析度優化 (老師端同步)
    const CSS_CANVAS_SIZE = 400;
    function setupCanvasHiDPI() {
      const ratio = window.devicePixelRatio || 1;
      canvas.width = CSS_CANVAS_SIZE * ratio;
      canvas.height = CSS_CANVAS_SIZE * ratio;
      canvas.style.width = CSS_CANVAS_SIZE + "px";
      canvas.style.height = CSS_CANVAS_SIZE + "px";
      ctx.scale(ratio, ratio);
      ctx.strokeStyle = '#212121'; 
      ctx.lineWidth = 4; 
      ctx.lineCap = 'round'; 
      ctx.lineJoin = 'round';
    }
    setupCanvasHiDPI();

    // 字典即時更新
    wordInput.addEventListener('input', (e) => {
      const val = e.target.value.trim();
      dictLink.href = `https://dict.revised.moe.edu.tw/search.jsp?md=1&word=${encodeURIComponent(val)}`;
    });

    // [新增] 更新大廳學生列表（老師端）
    function updateLobbyTeacher(playerOrder, playersMap) {
      lobbyPlayerListTeacher.innerHTML = "";
      if (playerOrder.length === 0) {
        lobbyPlayerListTeacher.innerHTML = '<span style="color:#78909c;">尚無學生加入</span>';
        btnStartGame.disabled = true;
        document.getElementById('lobbyHint').textContent = "請等待學生加入後再開始";
        return;
      }
      playerOrder.forEach(name => {
        const chip = document.createElement('div');
        chip.className = 'lobby-t-chip' + (playersMap[name] ? '' : ' offline');
        chip.textContent = (playersMap[name] ? '🟢 ' : '🔴 ') + name;
        lobbyPlayerListTeacher.appendChild(chip);
      });
      const onlineCount = playerOrder.filter(n => playersMap[n]).length;
      btnStartGame.disabled = (onlineCount === 0);
      document.getElementById('lobbyHint').textContent =
        `共 ${playerOrder.length} 位學生，線上 ${onlineCount} 位`;
    }

    // [修改] 更新畫布上方的玩家列表（超過4人改為下拉式選單）
    function updatePlayerListBar(playerOrder, playersMap, currentName) {
      playerListBar.innerHTML = '<span style="font-size:0.85em; color:#b0bec5; margin-right:4px; flex-shrink:0;">玩家：</span>';
      if (playerOrder.length > 4) {
        // 下拉式選單
        const sel = document.createElement('select');
        sel.style.cssText = 'background:#546e7a; color:#fff; border:none; border-radius:6px; padding:4px 8px; font-size:0.9em; cursor:pointer;';
        playerOrder.forEach(name => {
          const opt = document.createElement('option');
          const isOnline = !!playersMap[name];
          const isActive = (name === currentName);
          opt.value = name;
          opt.textContent = (isActive ? '✏️ ' : (isOnline ? '🟢 ' : '🔴 ')) + name;
          if (isActive) opt.style.background = '#c62828';
          sel.appendChild(opt);
        });
        if (currentName) sel.value = currentName;
        playerListBar.appendChild(sel);
        // 顯示目前輪到誰
        const badge = document.createElement('span');
        badge.style.cssText = 'background:#f44336; color:#fff; padding:3px 10px; border-radius:14px; font-size:0.85em; font-weight:bold; margin-left:6px;';
        badge.textContent = currentName ? '✏️ ' + currentName : '';
        playerListBar.appendChild(badge);
      } else {
        playerOrder.forEach(name => {
          const chip = document.createElement('div');
          const isOnline = !!playersMap[name];
          const isActive = (name === currentName);
          chip.className = 'player-chip' + (isActive ? ' active-turn' : '') + (isOnline ? '' : ' offline');
          const dotClass = isActive ? 'dot-active' : (isOnline ? 'dot-online' : 'dot-offline');
          chip.innerHTML = `<span class="player-chip-dot ${dotClass}"></span>${name}${isActive ? ' ✏️' : ''}`;
          playerListBar.appendChild(chip);
        });
      }
    }

    socket.on('drawing', (data) => {
      const prevWidth = ctx.lineWidth;
      ctx.lineWidth = data.width || 4;
      ctx.beginPath(); ctx.moveTo(data.x0, data.y0); ctx.lineTo(data.x1, data.y1); ctx.stroke();
      ctx.lineWidth = prevWidth;
    });

    socket.on('syncCanvas', (dataURL) => {
      const img = new Image();
      img.onload = () => {
        ctx.clearRect(0, 0, CSS_CANVAS_SIZE, CSS_CANVAS_SIZE);
        ctx.drawImage(img, 0, 0, CSS_CANVAS_SIZE, CSS_CANVAS_SIZE);
      };
      img.src = dataURL;
    });

    socket.on('clearCanvas', () => { ctx.clearRect(0, 0, CSS_CANVAS_SIZE, CSS_CANVAS_SIZE); });

    socket.on('gameState', (data) => {
      // [新增] 切換大廳/遊戲面板
      if (!data.gameStarted) {
        lobbyPanel.style.display = 'block';
        mainPanel.style.display = 'none';
        updateLobbyTeacher(data.playerOrder, data.playersMap);
        keepTeacherAtTop();
        return;
      }

      lobbyPanel.style.display = 'none';
      mainPanel.style.display = 'block';
      keepTeacherAtTop();

      // 只有在等待老師開始計時時顯示橫幅；計時中/暫停/時間到時保持隱藏。
      if ((data.turnPhase || 'waiting') === 'waiting') {
        waitingForTimer = true;
        startTimerBanner.style.display = 'block';
        btnStartTimerNow.disabled = false;
        btnStartTimerNow.textContent = '▶ 開始計時';
        timerDisplay.innerText = document.getElementById('timeInput').value || '15';
      } else {
        waitingForTimer = false;
        startTimerBanner.style.display = 'none';
        btnStartTimerNow.disabled = true;
        btnStartTimerNow.textContent = data.turnPhase === 'running' ? '計時中...' : '▶ 開始計時';
      }

      radicalDisplay.innerText = data.currentRadical;
      wordHistory.innerHTML = "";
      data.usedWords.forEach(word => {
        const span = document.createElement('span');
        span.className = 'word-tag'; span.innerText = word;
        wordHistory.appendChild(span);
      });
      wordInput.value = ""; 
      dictLink.href = "https://dict.revised.moe.edu.tw/search.jsp?md=1&word=";
      focusWordInputWithoutScroll();
      keepTeacherAtTop();

      // [新增] 更新玩家列表列與輪次徽章
      updatePlayerListBar(data.playerOrder, data.playersMap, data.currentName);
      if (data.currentName) {
        currentTurnBadge.textContent = '✏️ ' + data.currentName + ' 的回合';
        currentTurnBadge.className = 'player-turn-badge';
      } else {
        currentTurnBadge.textContent = '等待中...';
        currentTurnBadge.className = 'player-turn-badge waiting';
      }
    });

    socket.on('timeUpdate', (timeLeft) => {
      timerDisplay.innerText = timeLeft;
      // 橫幅只由 btnStartTimerNow 點擊後隱藏，不由 timeUpdate 控制
    });
    socket.on('timeUp', () => { timerDisplay.innerText = "時間到"; });
    socket.on('timerPaused', () => { timerDisplay.innerText += " (學生已送出)"; });
    socket.on('timerResumed', () => { timerDisplay.innerText = timerDisplay.innerText.replace(" (學生已送出)", ""); });

    // [新增] 開始遊戲按鈕
    btnStartGame.addEventListener('click', () => {
      socket.emit('startGame');
      keepTeacherAtTop();
    });

    // [新增] 手動開始計時按鈕 → 點擊後橫幅+設定整塊消失，只留三欄
    btnStartTimerNow.addEventListener('click', () => {
      waitingForTimer = false;
      startTimerBanner.style.display = 'none';
      btnStartTimerNow.disabled = true;
      btnStartTimerNow.textContent = '計時中...';
      socket.emit('startTimerNow');
    });

    // [新增] 遊戲中左欄重置按鈕（與banner裡的重置相同功能）
    document.getElementById('btnResetGameInline').addEventListener('click', () => {
      if (confirm("確定要重置遊戲並回到等待大廳？\n（玩家名單將會清空，學生需重新整理頁面加入）")) {
        waitingForTimer = false;
        timerDisplay.innerText = '--';
        startTimerBanner.style.display = 'block'; // 重置後橫幅重新出現
        socket.emit('resetGame');
      }
    });

    // [修改] 抽題/換題時重新顯示「開始計時」橫幅，並更新計時器顯示
    function resetTimerBannerAfterRadicalChange() {
      waitingForTimer = true;
      startTimerBanner.style.display = 'block';
      btnStartTimerNow.disabled = false;
      btnStartTimerNow.textContent = '▶ 開始計時';
      timerDisplay.innerText = document.getElementById('timeInput').value || defaultTimeDisplay;
      keepTeacherAtTop();
    }
    document.getElementById('btnEasy').addEventListener('click', () => { socket.emit('drawRadical','easy');   resetTimerBannerAfterRadicalChange(); });
    document.getElementById('btnMed').addEventListener('click',  () => { socket.emit('drawRadical','medium'); resetTimerBannerAfterRadicalChange(); });
    document.getElementById('btnHard').addEventListener('click', () => { socket.emit('drawRadical','hard');   resetTimerBannerAfterRadicalChange(); });

    // [新增] 清除離線玩家按鈕
    document.getElementById('btnRemoveOffline').addEventListener('click', () => {
      if (confirm("確定要從名單移除所有顯示離線的玩家嗎？")) {
        socket.emit('removeOfflinePlayers');
      }
    });

    // [新增] 重置遊戲按鈕
    document.getElementById('btnResetGame').addEventListener('click', () => {
      if (confirm("確定要重置遊戲並回到等待大廳？\n（玩家名單將會清空，學生需重新整理頁面加入）")) {
        waitingForTimer = false;
        timerDisplay.innerText = '--';
        startTimerBanner.style.display = 'block'; // 重置後橫幅重新可見
        socket.emit('resetGame');
      }
    });

    document.getElementById('btnApplyTime').addEventListener('click', () => {
      const newTime = document.getElementById('timeInput').value;
      defaultTimeDisplay = parseInt(newTime) || 15;
      socket.emit('updateTimeSetting', newTime);
      // [修改] 立即更新目前狀態顯示的秒數，不跳出提示
      timerDisplay.innerText = defaultTimeDisplay;
      const btn = document.getElementById('btnApplyTime');
      btn.textContent = '✅ 已套用';
      setTimeout(() => { btn.textContent = '套用'; }, 1500);
    });

    document.getElementById('btnApprove').addEventListener('click', () => {
      const word = wordInput.value.trim();
      if (!word) { alert("請輸入過關的國字！"); return; }
      socket.emit('teacherNextTurn', word);
    });

    document.getElementById('btnRetry').addEventListener('click', () => {
      socket.emit('teacherRejectRetry');
    });

    document.getElementById('btnFail').addEventListener('click', () => {
      socket.emit('teacherNextTurn', ""); 
    });

    document.getElementById('btnChangeRadical').addEventListener('click', () => {
      const newRad = prompt("請輸入新的自訂部首或題目：");
      if (newRad) {
        socket.emit('changeRadical', newRad);
        resetTimerBannerAfterRadicalChange();
      }
    });

    // 背景音樂控制
    const bgmAudio = document.getElementById('bgmAudio');
    const btnToggleBGM = document.getElementById('btnToggleBGM');
    const bgmVolume = document.getElementById('bgmVolume');
    
    bgmVolume.addEventListener('input', (e) => { bgmAudio.volume = e.target.value; });
    
    btnToggleBGM.addEventListener('click', () => {
      if (bgmAudio.paused) {
        bgmAudio.play();
        btnToggleBGM.innerText = "⏸️ 暫停 BGM";
        btnToggleBGM.style.background = "#ff9800";
      } else {
        bgmAudio.pause();
        btnToggleBGM.innerText = "🎵 播放 BGM";
        btnToggleBGM.style.background = "#607d8b";
      }
    });

    // --- 音效引擎 (完整保留) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();
    const masterGain = audioCtx.createGain(); 
    masterGain.connect(audioCtx.destination);

    document.getElementById('masterVolume').addEventListener('input', (e) => {
      masterGain.gain.value = e.target.value;
    });

    function playTone(freq, type, duration, startTime) {
      if(audioCtx.state === 'suspended') audioCtx.resume(); 
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.type = type;
      oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime + startTime);
      gainNode.gain.setValueAtTime(0, audioCtx.currentTime + startTime);
      gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + startTime + 0.05);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + startTime + duration);
      oscillator.connect(gainNode); gainNode.connect(masterGain);
      oscillator.start(audioCtx.currentTime + startTime);
      oscillator.stop(audioCtx.currentTime + startTime + duration);
    }

    function playWhistle(startTime) {
      if(audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1000, audioCtx.currentTime + startTime);
      osc.frequency.exponentialRampToValueAtTime(2000, audioCtx.currentTime + startTime + 0.2);
      osc.frequency.setValueAtTime(1400, audioCtx.currentTime + startTime + 0.25);
      osc.frequency.exponentialRampToValueAtTime(2400, audioCtx.currentTime + startTime + 0.35);
      osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + startTime + 0.7);
      gain.gain.setValueAtTime(0, audioCtx.currentTime + startTime);
      gain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + startTime + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + startTime + 0.2); 
      gain.gain.setValueAtTime(0, audioCtx.currentTime + startTime + 0.25);
      gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + startTime + 0.3);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + startTime + 0.7); 
      osc.connect(gain); gain.connect(masterGain);
      osc.start(audioCtx.currentTime + startTime);
      osc.stop(audioCtx.currentTime + startTime + 0.7);
    }

    function playWinSound() {
      playTone(392.00, 'triangle', 0.15, 0);   
      playTone(523.25, 'triangle', 0.15, 0.1); 
      playTone(659.25, 'triangle', 0.15, 0.2); 
      playTone(783.99, 'triangle', 0.4,  0.3); 
      playTone(523.25, 'sine', 0.6, 0.3);      
      playTone(659.25, 'sine', 0.6, 0.3); 
      playTone(1046.50, 'sine', 0.6, 0.3);
      playWhistle(0.6);
    }

    function playFailSound() {
      if(audioCtx.state === 'suspended') audioCtx.resume();
      const boing = audioCtx.createOscillator();
      const boingGain = audioCtx.createGain();
      boing.type = 'sine';
      boing.frequency.setValueAtTime(150, audioCtx.currentTime);
      boing.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
      boing.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
      boingGain.gain.setValueAtTime(0, audioCtx.currentTime);
      boingGain.gain.linearRampToValueAtTime(0.8, audioCtx.currentTime + 0.05);
      boingGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      boing.connect(boingGain); boingGain.connect(masterGain);
      boing.start(audioCtx.currentTime); boing.stop(audioCtx.currentTime + 0.3);

      function playWah(freq, delay) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime + delay);
        osc.frequency.exponentialRampToValueAtTime(freq * 0.8, audioCtx.currentTime + delay + 0.3);
        gain.gain.setValueAtTime(0, audioCtx.currentTime + delay);
        gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + delay + 0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delay + 0.35);
        osc.connect(gain); gain.connect(masterGain);
        osc.start(audioCtx.currentTime + delay); osc.stop(audioCtx.currentTime + delay + 0.35);
      }
      playWah(311.13, 0.3); playWah(293.66, 0.7); playWah(277.18, 1.1);

      const fart = audioCtx.createOscillator();
      const fartGain = audioCtx.createGain();
      fart.type = 'sawtooth';
      fart.frequency.setValueAtTime(261.63, audioCtx.currentTime + 1.5);
      fart.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 2.5); 
      fartGain.gain.setValueAtTime(0, audioCtx.currentTime + 1.5);
      fartGain.gain.linearRampToValueAtTime(0.6, audioCtx.currentTime + 1.6);
      fartGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.5);
      fart.connect(fartGain); fartGain.connect(masterGain);
      fart.start(audioCtx.currentTime + 1.5); fart.stop(audioCtx.currentTime + 2.5);
    }

    // [新增] 可見閃電劈下特效
    function showLightningBolt() {
      const bgFlash = document.createElement('div');
      bgFlash.className = 'lightning-bg-flash';
      document.body.appendChild(bgFlash);

      const wrapper = document.createElement('div');
      wrapper.className = 'lightning-bolt-wrapper';
      wrapper.innerHTML = `
        <svg class="lightning-bolt-svg" width="120" height="100vh" viewBox="0 0 120 800" xmlns="http://www.w3.org/2000/svg">
          <polyline points="60,0 80,160 50,160 85,360 40,360 90,560 30,560 75,760 60,800"
            fill="none" stroke="#fff9c4" stroke-width="28" stroke-linejoin="round" stroke-linecap="round" opacity="0.5"/>
          <polyline points="60,0 80,160 50,160 85,360 40,360 90,560 30,560 75,760 60,800"
            fill="none" stroke="#ffe033" stroke-width="14" stroke-linejoin="round" stroke-linecap="round"/>
          <polyline points="60,0 80,160 50,160 85,360 40,360 90,560 30,560 75,760 60,800"
            fill="none" stroke="white" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
          <circle cx="60" cy="800" r="36" fill="none" stroke="#ffe033" stroke-width="10" opacity="0.7"/>
          <circle cx="60" cy="800" r="20" fill="#fffde7" opacity="0.8"/>
        </svg>`;
      document.body.appendChild(wrapper);
      setTimeout(() => { wrapper.remove(); bgFlash.remove(); }, 1100);
    }

    socket.on('playAnimation', (type) => {
      if (type === 'pass') {
        playWinSound();
        confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#26ccff', '#a25afd', '#ff5e7e', '#88ff5a', '#fcff42'] });
      } else if (type === 'fail') {
        playFailSound();
        
        // 老師端也同步多樣化失敗特效
        const rand = Math.random();
        if (rand < 0.33) {
          const failText = document.getElementById('failWa');
          failText.style.animation = "waShake 1s forwards";
          setTimeout(() => failText.style.animation = "", 1500);
        } else if (rand < 0.66) {
          // [修改] 可見閃電劈下
          showLightningBolt();
        } else {
          const wrapper = document.createElement('div');
          wrapper.className = 'crows-wrapper';
          const crowSVG = `<svg class="anime-crow-svg" viewBox="0 0 280 200" width="280" height="200"><path d="M 120 110 L 170 90 L 160 130 Z" fill="#222" /><path d="M 90 100 Q 130 50 170 60 L 140 80 L 160 90 L 130 100 L 150 110 L 110 110 Z" fill="#111" stroke="#333" stroke-width="2" /><ellipse cx="90" cy="110" rx="45" ry="35" fill="#222" /><circle cx="65" cy="80" r="30" fill="#222" /><path d="M 40 80 L 5 95 L 45 95 Z" fill="#ffb300" /><path d="M 45 95 L 10 105 L 50 100 Z" fill="#ff9900" /><path d="M 85 105 Q 110 60 140 70 L 120 85 L 145 95 L 115 105 L 130 115 L 90 120 Z" fill="#1a1a1a" stroke="#444" stroke-width="2" /><circle cx="55" cy="75" r="9" fill="#eee" /><line x1="45" y1="75" x2="65" y2="75" stroke="#111" stroke-width="3" /><circle cx="55" cy="78" r="3" fill="#111" /><path d="M 80 40 L 80 65 M 92 35 L 92 65 M 104 40 L 104 65" stroke="#9c27b0" stroke-width="3.5" stroke-linecap="round" /><text x="120" y="30" font-size="35" fill="#333" font-weight="bold">...</text></svg>`;
          wrapper.innerHTML = `<div class="anime-crow-container crow-1">${crowSVG}</div><div class="anime-crow-container crow-2">${crowSVG}</div><div class="anime-crow-container crow-3">${crowSVG}</div>`;
          document.body.appendChild(wrapper);
          setTimeout(() => { wrapper.remove(); }, 3000);
        }
      }
    });

    // [新增] 冠軍動畫
    const winnerOverlay = document.getElementById('winnerOverlay');
    const winnerNameDisplay = document.getElementById('winnerNameDisplay');

    socket.on('gameWinner', (winnerName) => {
      const name = winnerName || '所有人（平手）';
      winnerNameDisplay.textContent = name;
      winnerOverlay.classList.add('active');
      // 連續彩帶爆炸
      function burstConfetti() {
        confetti({ particleCount: 120, angle: 60,  spread: 80, origin: { x: 0,   y: 0.6 }, colors: ['#ffd700','#ff8c00','#fff','#ff69b4'] });
        confetti({ particleCount: 120, angle: 120, spread: 80, origin: { x: 1,   y: 0.6 }, colors: ['#00e5ff','#7fff00','#ffd700','#ff69b4'] });
        confetti({ particleCount: 80,  angle: 90,  spread: 120,origin: { x: 0.5, y: 0.3 }, colors: ['#fff','#ffd700','#ff8c00'] });
      }
      burstConfetti();
      setTimeout(burstConfetti, 800);
      setTimeout(burstConfetti, 1600);
      setTimeout(burstConfetti, 2600);
      // 勝利音效
      playWinSound();
      setTimeout(playWinSound, 1000);
    });

    // [新增] 重新開始按鈕
    document.getElementById('btnFullReset').addEventListener('click', () => {
      if (confirm("確定要重新開始？所有學生將需要重新輸入姓名加入。")) {
        winnerOverlay.classList.remove('active');
        waitingForTimer = false;
        timerDisplay.innerText = '--';
        socket.emit('fullReset');
      }
    });

  </script>
</body>
</html>
